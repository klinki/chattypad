name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows-release:
    name: build-windows-release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows app
        run: bun run build

      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $artifactDir = Join-Path $PWD "artifacts"
          $artifacts = Get-ChildItem -Path $artifactDir -Filter "stable-win-x64-*" |
            Sort-Object Name |
            Select-Object -ExpandProperty FullName

          if (-not $artifacts) {
            throw "No Electrobun release artifacts were produced in '$artifactDir'."
          }

          gh release upload "${{ needs.release-please.outputs.tag_name }}" $artifacts --clobber
