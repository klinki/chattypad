name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows-release:
    name: build-windows-release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows stable app
        run: bun run build:stable

      - name: Collect Windows stable release assets
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $setupExe = Get-ChildItem build -Recurse -File -Filter chattypad-Setup.exe | Select-Object -First 1
          if (-not $setupExe) {
            throw "Could not find chattypad-Setup.exe in the Electrobun build output."
          }

          $metadata = Get-ChildItem build -Recurse -File -Filter chattypad-Setup.metadata.json | Select-Object -First 1
          $archive = Get-ChildItem build -Recurse -File -Filter chattypad-Setup.tar.zst | Select-Object -First 1
          if (-not $metadata -or -not $archive) {
            throw "Could not find stable release metadata or archive in the Electrobun build output."
          }

          $assetDir = Join-Path $env:RUNNER_TEMP "chattypad-stable-release"
          if (Test-Path $assetDir) {
            Remove-Item $assetDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $assetDir | Out-Null
          Copy-Item $setupExe.FullName -Destination $assetDir
          Copy-Item $metadata.FullName -Destination $assetDir
          Copy-Item $archive.FullName -Destination $assetDir
          "ASSET_DIR=$assetDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" `
            "$env:ASSET_DIR\chattypad-Setup.exe" `
            "$env:ASSET_DIR\chattypad-Setup.metadata.json" `
            "$env:ASSET_DIR\chattypad-Setup.tar.zst" `
            --clobber
