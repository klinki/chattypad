name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-windows-release:
    name: build-windows-release
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows app
        run: bun run build

      - name: Package Windows release
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $launcher = Get-ChildItem build -Recurse -File -Filter launcher.exe | Select-Object -First 1
          if (-not $launcher) {
            throw "Could not find launcher.exe in the Electrobun build output."
          }

          $appDir = $launcher.Directory.Parent
          $zipPath = Join-Path $env:RUNNER_TEMP "chattypad-$env:TAG_NAME-windows-x64.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path (Join-Path $appDir.FullName "*") -DestinationPath $zipPath -Force
          "ZIP_PATH=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" "$env:ZIP_PATH" --clobber
