<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A29BFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0EEFF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow1" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#2D1B69" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg1)"/>

  <!-- Notepad body -->
  <rect x="120" y="100" width="220" height="280" rx="16" ry="16" fill="url(#pad1)" filter="url(#shadow1)"/>

  <!-- Notepad top binding dots -->
  <circle cx="160" cy="100" r="8" fill="#6C5CE7"/>
  <circle cx="200" cy="100" r="8" fill="#6C5CE7"/>
  <circle cx="240" cy="100" r="8" fill="#6C5CE7"/>
  <circle cx="280" cy="100" r="8" fill="#6C5CE7"/>
  <circle cx="320" cy="100" r="8" fill="#6C5CE7"/>

  <!-- Notepad lines -->
  <line x1="148" y1="155" x2="312" y2="155" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="185" x2="290" y2="185" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="215" x2="305" y2="215" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="245" x2="260" y2="245" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="148" y1="275" x2="280" y2="275" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>

  <!-- Chat bubble coming from notepad -->
  <g filter="url(#shadow1)">
    <path d="M 290 260 Q 290 230, 340 230 L 400 230 Q 430 230, 430 260 L 430 320 Q 430 350, 400 350 L 360 350 L 340 385 L 335 350 L 340 350 Q 290 350, 290 320 Z" fill="#FFC312" />
  </g>

  <!-- Chat bubble dots -->
  <circle cx="330" cy="290" r="10" fill="#6C5CE7"/>
  <circle cx="360" cy="290" r="10" fill="#6C5CE7"/>
  <circle cx="390" cy="290" r="10" fill="#6C5CE7"/>
</svg>
