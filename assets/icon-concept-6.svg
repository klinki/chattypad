<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A29BFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6b" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#FDCB6E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F39C12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F8F7FF;stop-opacity:1" />
    </linearGradient>
    <filter id="s6" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1B1464" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- Document with folded corner (main shape) -->
  <g filter="url(#s6)">
    <path d="
      M 90 44
      L 342 44
      L 422 124
      L 422 440
      Q 422 460, 402 460
      L 110 460
      Q 90 460, 90 440
      Z
    " fill="url(#grad6paper)"/>
    <!-- Folded corner triangle -->
    <path d="M 342 44 L 342 124 L 422 124 Z" fill="#E8E4FF"/>
    <path d="M 342 44 L 342 124 L 422 124" fill="none" stroke="#C8C0F8" stroke-width="1"/>
  </g>

  <!-- Top accent bar (like a title bar / header) -->
  <rect x="90" y="44" width="252" height="12" rx="0" fill="url(#grad6a)"/>

  <!-- Text lines -->
  <line x1="130" y1="170" x2="382" y2="170" stroke="#D5CFF5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="130" y1="210" x2="360" y2="210" stroke="#D5CFF5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="130" y1="250" x2="370" y2="250" stroke="#D5CFF5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="130" y1="290" x2="320" y2="290" stroke="#D5CFF5" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="130" y1="330" x2="345" y2="330" stroke="#D5CFF5" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Two overlapping chat bubbles in the bottom-right (the "chatty" element) -->
  <!-- Back bubble -->
  <g filter="url(#s6)">
    <path d="
      M 270 340
      Q 270 316, 300 316
      L 420 316
      Q 448 316, 448 340
      L 448 405
      Q 448 428, 420 428
      L 370 428
      L 345 462
      L 340 428
      L 300 428
      Q 270 428, 270 405
      Z
    " fill="url(#grad6a)"/>
  </g>
  <!-- Front bubble (smaller, overlapping) -->
  <g filter="url(#s6)">
    <path d="
      M 305 358
      Q 305 340, 328 340
      L 435 340
      Q 458 340, 458 358
      L 458 410
      Q 458 428, 435 428
      L 408 428
      L 420 458
      L 390 428
      L 328 428
      Q 305 428, 305 410
      Z
    " fill="url(#grad6b)"/>
  </g>

  <!-- Typing dots in front bubble -->
  <circle cx="355" cy="387" r="8" fill="white" opacity="0.9"/>
  <circle cx="382" cy="387" r="8" fill="white" opacity="0.7"/>
  <circle cx="409" cy="387" r="8" fill="white" opacity="0.5"/>

  <!-- Mini text line in back bubble -->
  <line x1="298" y1="370" x2="340" y2="370" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>
