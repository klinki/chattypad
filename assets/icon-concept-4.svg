<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad4a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A29BFE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FDCB6E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E17055;stop-opacity:1" />
    </linearGradient>
    <filter id="s4" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#2D1B69" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Notepad page (back, slightly offset) -->
  <rect x="118" y="52" width="260" height="340" rx="18" ry="18" fill="#DDD6FE" filter="url(#s4)"/>

  <!-- Notepad page (front) -->
  <rect x="100" y="36" width="260" height="340" rx="18" ry="18" fill="white" filter="url(#s4)"/>

  <!-- Spiral binding holes -->
  <circle cx="120" cy="80" r="7" fill="#6C5CE7"/>
  <circle cx="120" cy="120" r="7" fill="#6C5CE7"/>
  <circle cx="120" cy="160" r="7" fill="#6C5CE7"/>
  <circle cx="120" cy="200" r="7" fill="#6C5CE7"/>
  <circle cx="120" cy="240" r="7" fill="#6C5CE7"/>
  <circle cx="120" cy="280" r="7" fill="#6C5CE7"/>
  <circle cx="120" cy="320" r="7" fill="#6C5CE7"/>

  <!-- Text lines on notepad -->
  <line x1="150" y1="90" x2="330" y2="90" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="125" x2="310" y2="125" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="160" x2="320" y2="160" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="195" x2="290" y2="195" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="230" x2="300" y2="230" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>
  <line x1="150" y1="265" x2="260" y2="265" stroke="#C8C0F8" stroke-width="3" stroke-linecap="round"/>

  <!-- Chat bubble overlapping bottom-right of the notepad -->
  <g filter="url(#s4)">
    <path d="
      M 260 310
      Q 260 280, 295 280
      L 400 280
      Q 432 280, 432 310
      L 432 390
      Q 432 420, 400 420
      L 330 420
      L 300 466
      L 296 420
      L 295 420
      Q 260 420, 260 390
      Z
    " fill="url(#grad4a)"/>
  </g>

  <!-- Chat bubble content: three lines (like a mini note inside the bubble) -->
  <line x1="290" y1="320" x2="400" y2="320" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  <line x1="290" y1="350" x2="385" y2="350" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="290" y1="380" x2="360" y2="380" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
</svg>
