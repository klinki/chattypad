<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad5a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0984E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C5CE7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00CEC9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#55EFC4;stop-opacity:1" />
    </linearGradient>
    <filter id="s5" x="-8%" y="-8%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1B1464" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Large speech bubble (the "pad" — main writing surface) -->
  <g filter="url(#s5)">
    <path d="
      M 80 60
      L 432 60
      Q 468 60, 468 96
      L 468 340
      Q 468 376, 432 376
      L 200 376
      L 130 456
      L 130 376
      L 80 376
      Q 44 376, 44 340
      L 44 96
      Q 44 60, 80 60
      Z
    " fill="url(#grad5a)"/>
  </g>

  <!-- Text lines inside the bubble (notepad content) -->
  <line x1="95" y1="130" x2="417" y2="130" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
  <line x1="95" y1="175" x2="380" y2="175" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.65"/>
  <line x1="95" y1="220" x2="400" y2="220" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.50"/>
  <line x1="95" y1="265" x2="340" y2="265" stroke="white" stroke-width="4.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Pencil/pen crossing over the bubble -->
  <g transform="rotate(-30, 400, 100)" filter="url(#s5)">
    <!-- Pen body -->
    <rect x="380" y="40" width="30" height="180" rx="6" fill="url(#grad5b)"/>
    <!-- Pen clip -->
    <rect x="395" y="40" width="6" height="50" rx="3" fill="white" opacity="0.5"/>
    <!-- Pen tip -->
    <polygon points="380,220 410,220 395,258" fill="#2D3436"/>
    <polygon points="388,240 402,240 395,258" fill="#636E72"/>
    <!-- Pen cap -->
    <rect x="378" y="32" width="34" height="18" rx="6" fill="#2D3436"/>
  </g>
</svg>
