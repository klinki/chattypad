  <style>
    :root {
      --bg-darker: #0c0c0e;
      --bg-sidebar: #111113;
      --bg-header: #111113;
      --bg-hover: rgba(255, 255, 255, 0.05);
      --bg-active: rgba(255, 255, 255, 0.08);
      --text-main: #e1e1e1;
      --text-muted: #8e9099;
      --accent: #7c7cfc;
      --border-subtle: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    html, body, #root { 
      height: 100%; 
      width: 100%; 
      overflow: hidden; 
      margin: 0; 
      padding: 0; 
    }

    body {
      background-color: var(--bg-darker);
      color: var(--text-main);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Reset buttons */
    button {
      appearance: none;
      background: none;
      border: none;
      padding: 0;
      margin: 0;
      font-family: inherit;
      color: inherit;
      cursor: pointer;
      outline: none;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Layout Classes */
    .top-action-btn {
      background: transparent !important;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .top-action-btn:hover {
      background: var(--bg-hover) !important;
      color: var(--text-main);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .btn-subtle {
      background: transparent !important;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      opacity: 0.5;
      transition: all 0.2s ease;
      border-radius: 4px;
    }
    .btn-subtle:hover {
      opacity: 1;
      background: var(--bg-hover) !important;
    }

    .sidebar-item-container {
      transition: background-color 0.15s ease;
      border-radius: 6px;
      margin: 0 8px;
    }
    .sidebar-item-container:hover {
      background-color: var(--bg-hover);
    }

    .thread-item {
      transition: all 0.2s ease;
    }
    .thread-item.active {
      background-color: var(--bg-hover) !important;
      color: #fff !important;
    }

    .project-threads-container {
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }
    .project-threads-container.collapsed {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    .project-header:hover .btn-subtle {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
